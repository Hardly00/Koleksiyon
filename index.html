<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRICK Koleksiyonum</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d11212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
      // VERSİYON KONTROLÜ
      const APP_VERSION = "1.2.1"; 
      
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js?v=' + APP_VERSION).then(reg => {
          reg.onupdatefound = () => {
            const worker = reg.installing;
            worker.onstatechange = () => {
              if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                if(confirm("Yeni sürüm hazır! Güncellensin mi?")) window.location.reload();
              }
            };
          };
        });
      }
    </script>

    <style>
        :root {
            --primary-navy: #002b5c; 
            --brick-red: #d11212;
            --brick-yellow: #ffcf00;
            --success-green: #28a745;
            --accent-blue: #005596;
            --bg-light: #f4f6f9;
            --card-bg: #ffffff;
            --text-dark: #1a1a1a;
            --border-color: #dee2e6;
        }

        body.dark-mode {
            --bg-light: #0f172a;
            --card-bg: #1e293b;
            --text-dark: #f8fafc;
            --border-color: #334155;
            --primary-navy: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0; padding: 20px; transition: 0.3s;
            padding-bottom: 140px;
        }

        @media (display-mode: standalone) {
            #installAppBtn { display: none !important; }
        }

        .container { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 320px 1fr; gap: 25px; }

        header {
            grid-column: 1 / -1;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: var(--primary-navy); color: white;
            border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #qrModal {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--card-bg); border: 2px solid var(--accent-blue);
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 5000; padding: 15px;
            text-align: center;
        }

        .controls { background: var(--card-bg); padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .panel h4 { margin: 0 0 10px 0; color: var(--accent-blue); font-size: 14px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }

        .set-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        
        .set-card {
            border: 1px solid var(--border-color); padding: 12px; border-radius: 10px;
            background: var(--card-bg); display: flex; flex-direction: column;
            height: 440px; box-sizing: border-box; position: relative;
        }
        .set-card img { width: 100%; height: 110px; object-fit: contain; margin-bottom: 10px; }
        .set-name { font-size: 12px; font-weight: bold; height: 35px; overflow: hidden; margin-bottom: 5px; }
        
        .card-inputs { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .card-inputs input { padding: 8px; font-size: 11px; border: 1px solid var(--border-color); border-radius: 6px; width: 100%; box-sizing: border-box; background: var(--bg-light); color: var(--text-dark); }

        .card-actions { margin-top: auto; display: flex; flex-direction: column; gap: 5px; }

        .btn { border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; padding: 10px; font-size: 12px; width: 100%; transition: 0.2s; }
        .btn-add { background-color: var(--accent-blue); }
        .btn-cat { background-color: var(--success-green); }
        .btn-instr { background-color: var(--brick-yellow); color: #000; text-decoration: none; text-align: center; display: block; line-height: 20px; }
        .btn-delete { background-color: #dc3545; }

        /* ALT PANEL (3 SÜTUN) */
        .total-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--primary-navy); color: white;
            padding: 15px 5px; display: grid; grid-template-columns: 1fr 1fr 1fr;
            border-top: 4px solid var(--brick-yellow);
            z-index: 4000; text-align: center; box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
        }
        .total-panel div { border-right: 1px solid rgba(255,255,255,0.1); }
        .total-panel div:last-child { border-right: none; }
        .total-panel span { display: block; font-size: 10px; opacity: 0.7; text-transform: uppercase; }
        .total-val { color: var(--brick-yellow); font-weight: bold; font-size: 14px; margin-top: 4px; }

        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-top: 10px; border: 1px solid var(--border-color); }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
            .sidebar { order: 2; }
            .main-content { order: 1; }
            .total-panel { padding: 12px 2px; }
            .total-val { font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="qrModal">
    <h4 style="margin:0 0 10px 0; color:var(--accent-blue);">QR Kod Okundu</h4>
    <p id="modalUrl" style="font-size:11px; word-break:break-all; background:#f0f0f0; padding:8px; border-radius:5px; color:#333;"></p>
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button class="btn" style="background:var(--success-green);" onclick="koduAyikla()">🎯 Kodu Ayıkla</button>
        <button class="btn" style="background:#6c757d;" onclick="modalKapat()">Kapat</button>
    </div>
</div>

<header>
    <h2 style="margin:0; font-size: 18px;">🧱 BRICK KOLEKSİYONUM</h2>
    <div style="display: flex; gap: 10px; align-items: center;">
        <span style="font-size: 12px; background: var(--brick-red); padding: 5px 10px; border-radius: 20px;">Set: <span id="grandTotalCount">0</span></span>
    </div>
</header>

<div class="container">
    <div class="sidebar">
        <div class="controls">
            <div class="panel">
                <h4>Grup (Kategori) Ekle</h4>
                <input type="text" id="newCatInput" placeholder="Örn: Technic, Star Wars" style="padding:10px; width:100%; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; background: var(--bg-light); color: var(--text-dark);">
                <button class="btn btn-cat" style="margin-top:8px;" onclick="kategoriEkle()">+ Grup Oluştur</button>
            </div>

            <div class="panel">
                <h4>Yeni Set Ekle</h4>
                <div id="reader" style="display:none;"></div>
                <button id="scanBtn" class="btn" style="background:var(--primary-navy)" onclick="barkodTarayiciyiBaslat()">📷 Barkod/QR Tara</button>
                <input type="text" id="setNo" placeholder="Set Kodu (Örn: 42151)" style="margin-top:10px; padding:10px; width:100%; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; background: var(--bg-light); color: var(--text-dark);">
                <input type="number" id="priceInput" placeholder="Alış Fiyatı (TL)" style="margin-top:8px; padding:10px; width:100%; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; background: var(--bg-light); color: var(--text-dark);">
                <select id="categorySelect" style="margin-top:8px; padding:10px; width:100%; border-radius:8px; border:1px solid #ccc; background: var(--bg-light); color: var(--text-dark);"></select>
                <button class="btn btn-add" style="margin-top:10px;" onclick="setGetir()">Koleksiyona Ekle</button>
            </div>

            <div class="panel">
                <h4>Ayarlar & Araçlar</h4>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <button class="btn" style="background:#6c757d; font-size:10px;" onclick="verileriYedekle()">📥 Yedekle</button>
                    <button class="btn" style="background:#6c757d; font-size:10px;" onclick="document.getElementById('importInput').click()">📤 Yükle</button>
                </div>
                <button class="btn" style="background:var(--primary-navy); margin-top:8px;" onclick="toggleDarkMode()">🌓 Gece/Gündüz Modu</button>
                <button class="btn btn-delete" style="margin-top:8px;" onclick="tumunuTemizle()">🗑️ Tümünü Sil</button>
                <input type="file" id="importInput" style="display:none" onchange="verileriYukle(event)">
            </div>
            
            <button id="installAppBtn" class="btn" style="background:#000; margin-top:10px;" onclick="uygulamayiYukle()">📲 Uygulamayı Yükle</button>
        </div>
    </div>
    <div class="main-content" id="mainDisplay"></div>
</div>

<div class="total-panel">
    <div><span>Parça</span><span id="totalParts" class="total-val">0</span></div>
    <div><span>Güncel</span><span id="totalCurrent" class="total-val">0 ₺</span></div>
    <div><span>Alış</span><span id="totalTaken" class="total-val">0 ₺</span></div>
</div>

<script>
    const API_KEY = 'c10a8ebe89136b8802982ac9523cd8bf'; 
    const DB_NAME = 'BrickKoleksiyonDeneme'; 
    const DB_VERSION = 1;

    let db, koleksiyon = {}, isDarkMode = localStorage.getItem('darkMode') === 'true';

    let html5QrCode;
    async function barkodTarayiciyiBaslat() {
        const readerDiv = document.getElementById('reader');
        if (readerDiv.style.display === 'block') {
            if(html5QrCode) await html5QrCode.stop();
            readerDiv.style.display = 'none';
            return;
        }
        readerDiv.style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, 
            (decodedText) => {
                document.getElementById('modalUrl').innerText = decodedText;
                document.getElementById('qrModal').style.display = 'block';
                html5QrCode.stop();
                readerDiv.style.display = 'none';
            }
        ).catch(() => alert("Kamera izni gerekiyor."));
    }

    function koduAyikla() {
        const url = document.getElementById('modalUrl').innerText;
        const matches = url.match(/\d{4,7}/);
        if (matches) {
            document.getElementById('setNo').value = matches[0];
            modalKapat();
        } else {
            alert("Set kodu bulunamadı.");
        }
    }

    function modalKapat() { document.getElementById('qrModal').style.display = 'none'; }

    async function init() {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = e => {
            if (!e.target.result.objectStoreNames.contains('data')) e.target.result.createObjectStore('data');
        };
        request.onsuccess = async e => {
            db = e.target.result;
            koleksiyon = await dbGet('koleksiyon') || {};
            if(isDarkMode) document.body.classList.add('dark-mode');
            dropdownGuncelle();
            ekranıCiz();
        };
    }

    async function dbGet(k) {
        return new Promise(res => {
            const tx = db.transaction(['data'], 'readonly');
            const req = tx.objectStore('data').get(k);
            req.onsuccess = () => res(req.result);
        });
    }

    async function dbSet(k, v) {
        return new Promise(res => {
            const tx = db.transaction(['data'], 'readwrite');
            tx.objectStore('data').put(v, k);
            tx.oncomplete = () => res();
        });
    }

    async function kategoriEkle() {
        const isim = document.getElementById('newCatInput').value.trim();
        if (isim && !koleksiyon[isim]) {
            koleksiyon[isim] = [];
            await dbSet('koleksiyon', koleksiyon);
            dropdownGuncelle();
            document.getElementById('newCatInput').value = '';
            ekranıCiz();
        } else if (!isim) {
            alert("Grup adı girin.");
        } else {
            alert("Bu grup zaten var.");
        }
    }

    function dropdownGuncelle() {
        const select = document.getElementById('categorySelect');
        if(!select) return;
        const keys = Object.keys(koleksiyon);
        select.innerHTML = keys.length === 0 ? '<option value="">Önce Grup Oluşturun</option>' : keys.map(k => `<option value="${k}">${k}</option>`).join('');
    }

    async function setGetir() {
        const setNo = document.getElementById('setNo').value.trim();
        const fiyat = parseFloat(document.getElementById('priceInput').value) || 0;
        const kat = document.getElementById('categorySelect').value;
        if(!setNo || !kat) return alert("Eksik bilgi!");

        try {
            const res = await fetch(`https://rebrickable.com/api/v3/lego/sets/${setNo}-1/`, {
                headers: { 'Authorization': `key ${API_KEY}` }
            });
            const data = await res.json();
            if(data.detail) throw new Error("Set bulunamadı.");

            if(!koleksiyon[kat]) koleksiyon[kat] = [];
            koleksiyon[kat].push({
                id: data.set_num,
                name: data.name,
                img: data.set_img_url,
                parts: data.num_parts || 0,
                takenPrice: fiyat,
                currentPrice: 0,
                instructions: `https://www.lego.com/en-us/service/buildinginstructions/${data.set_num.split('-')[0]}`
            });

            await dbSet('koleksiyon', koleksiyon);
            document.getElementById('setNo').value = '';
            document.getElementById('priceInput').value = '';
            ekranıCiz();
        } catch (e) { alert("Hata: " + e.message); }
    }

    function ekranıCiz() {
        const display = document.getElementById('mainDisplay');
        display.innerHTML = '';
        let tTaken = 0, tCurrent = 0, tParts = 0, tSets = 0;

        Object.keys(koleksiyon).forEach(kat => {
            const sets = koleksiyon[kat];
            if(sets.length === 0 && kat !== "Genel") return;
            
            const katDiv = document.createElement('div');
            katDiv.className = 'category-section';
            katDiv.innerHTML = `<h3 style="color:var(--primary-navy); border-bottom:2px solid var(--border-color); padding-bottom:5px; margin-top:20px;">${kat} (${sets.length})</h3><div class="set-grid"></div>`;
            const grid = katDiv.querySelector('.set-grid');

            sets.forEach((set, idx) => {
                tTaken += set.takenPrice;
                tCurrent += (set.currentPrice || 0);
                tParts += (set.parts || 0); 
                tSets++;

                grid.innerHTML += `
                    <div class="set-card">
                        <img src="${set.img}">
                        <div class="set-name">${set.name}</div>
                        <div style="font-size:10px; color:gray;">🧩 ${set.parts} Parça</div>
                        
                        <div class="card-inputs">
                            <label style="font-size:9px; color:var(--brick-red)">Alış: ${set.takenPrice} ₺</label>
                            <input type="number" placeholder="Güncel Değer (₺)" value="${set.currentPrice || ''}" onchange="fiyatGuncelle('${kat}', ${idx}, this.value)">
                        </div>

                        <div class="card-actions">
                            <a href="${set.instructions}" target="_blank" class="btn btn-instr">📖 Talimatlar</a>
                            <button class="btn btn-delete" onclick="setSil('${kat}', ${idx})">Sil</button>
                        </div>
                    </div>`;
            });
            display.appendChild(katDiv);
        });

        document.getElementById('grandTotalCount').innerText = tSets;
        document.getElementById('totalParts').innerText = tParts.toLocaleString();
        document.getElementById('totalCurrent').innerText = tCurrent.toLocaleString() + " ₺";
        document.getElementById('totalTaken').innerText = tTaken.toLocaleString() + " ₺";
    }

    async function fiyatGuncelle(kat, idx, val) {
        koleksiyon[kat][idx].currentPrice = parseFloat(val) || 0;
        await dbSet('koleksiyon', koleksiyon);
        ekranıCiz();
    }

    async function setSil(kat, idx) {
        if(confirm("Silinsin mi?")) {
            koleksiyon[kat].splice(idx, 1);
            await dbSet('koleksiyon', koleksiyon);
            ekranıCiz();
        }
    }

    function toggleDarkMode() {
        isDarkMode = !isDarkMode;
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', isDarkMode);
    }

    function verileriYedekle() {
        const blob = new Blob([JSON.stringify({koleksiyon})], {type: "application/json"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `brick_yedek.json`;
        link.click();
    }

    async function verileriYukle(e) {
        const reader = new FileReader();
        reader.onload = async (event) => {
            try {
                koleksiyon = JSON.parse(event.target.result).koleksiyon || {};
                await dbSet('koleksiyon', koleksiyon);
                dropdownGuncelle();
                ekranıCiz();
            } catch(e) { alert("Hata."); }
        };
        reader.readAsText(e.target.files[0]);
    }

    async function tumunuTemizle() {
        if(confirm("Her şey silinecek!")) {
            koleksiyon = {};
            await dbSet('koleksiyon', koleksiyon);
            dropdownGuncelle();
            ekranıCiz();
        }
    }

    function uygulamayiYukle() { alert("Tarayıcı menüsünden 'Ana Ekrana Ekle' seçeneğini kullanın."); }

    init();
</script>
</body>
</html>
